services:
  postgres:
    image: postgres:17
    container_name: smart-subscriptions-postgres
    environment:
      POSTGRES_DB: subscriptions
      POSTGRES_USER: subscriptions
      POSTGRES_PASSWORD: subscriptions
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U subscriptions -d subscriptions"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: smart-subscriptions-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/subscriptions
      SPRING_DATASOURCE_USERNAME: subscriptions
      SPRING_DATASOURCE_PASSWORD: subscriptions
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

volumes:
  postgres_data:
