services:
  app:
    build: .
    container_name: smart-subscriptions-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/subscriptions
      SPRING_DATASOURCE_USERNAME: subscriptions
      SPRING_DATASOURCE_PASSWORD: subscriptions
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"